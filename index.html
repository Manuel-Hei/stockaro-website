<script>
  // Restore theme on load — respect saved choice, otherwise follow OS
  const saved = localStorage.getItem('sk-theme');
  const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  const initialTheme = saved || (prefersDark ? 'dark' : 'light');
  document.documentElement.setAttribute('data-theme', initialTheme);
</script>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ─── THEME ──────────────────────────────────────────────────────
function useTheme() {
  const getSystem = () => (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  const [theme, setTheme] = useState(() => localStorage.getItem('sk-theme') || getSystem());
  useEffect(() => {
    if (!window.matchMedia) return;
    const mq = window.matchMedia('(prefers-color-scheme: dark)');
    const onChange = (e) => {
      if (localStorage.getItem('sk-theme')) return; // manual override wins
      const next = e.matches ? 'dark' : 'light';
      setTheme(next);
      document.documentElement.setAttribute('data-theme', next);
    };
    mq.addEventListener ? mq.addEventListener('change', onChange) : mq.addListener(onChange);
    return () => { mq.removeEventListener ? mq.removeEventListener('change', onChange) : mq.removeListener(onChange); };
  }, []);
  const toggle = () => {
    const next = theme === 'light' ? 'dark' : 'light';
    setTheme(next);
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('sk-theme', next);
  };
  return [theme, toggle];
}


// ─── MOBILE HOOK ────────────────────────────────
function useMobile() {
  const [mobile, setMobile] = useState(() => window.innerWidth <= 768);
  useEffect(() => {
    const fn = () => setMobile(window.innerWidth <= 768);
    window.addEventListener('resize', fn);
    return () => window.removeEventListener('resize', fn);
  }, []);
  return mobile;
}

// ─── APP ────────────────────────────────────────────────────────
function App() {
  const [theme, toggleTheme] = useTheme();
  const [tweaks, setTweaks] = useState(false);

  useEffect(() => {
    window.addEventListener('message', e => {
      if (e.data?.type === '__activate_edit_mode') setTweaks(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaks(false);
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  }, []);

  return (
    <>
      <MigrationBanner/>
      <Nav theme={theme} onToggleTheme={toggleTheme}/>
      <Hero/>
      <TrustBar/>
      <ProblemSection/>
      <ComparisonTable/>
      <ThreeSteps/>
      <Features/>
      <ScannerShowcase/>
      <Testimonials/>
      <Pricing/>
      <FAQ/>
      <FinalCTA/>
      <Footer/>
      {tweaks && <TweaksPanel onClose={() => setTweaks(false)}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
